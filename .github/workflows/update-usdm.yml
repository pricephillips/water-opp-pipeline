name: Update USDM Drought Data

on:
  schedule:
    - cron: "0 18 * * 4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute USDM snapshot date
        id: dates
        run: |
          python3 - <<'PY'
          import os
          from datetime import date, timedelta
          
          # Find the most recent Tuesday (USDM data snapshot day)
          today = date.today()
          days_back = (today.weekday() - 1) % 7
          snapshot = today - timedelta(days=days_back)
          
          # USDM API requires exact format: M/D/YYYY (no leading zeros)
          usdm_date = f"{snapshot.month}/{snapshot.day}/{snapshot.year}"
          
          print(f"Computed USDM Date: {usdm_date}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"usdm_date={usdm_date}\n")
          PY

      - name: Download latest county statistics CSV
        run: |
          mkdir -p data/raw
          python3 - <<'PY'
          import csv
          import os
          import requests
          from datetime import datetime, timedelta
          from pathlib import Path

          states = [
              "AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID","IL","IN","IA","KS","KY","LA","ME","MD",
              "MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC",
              "SD","TN","TX","UT","VT","VA","WA","WV","WI","WY","DC","PR"
          ]

          # Parse the initial date we got from the previous step
          usdm_date_str = os.environ["USDM_DATE"]
          current_dt = datetime.strptime(usdm_date_str, "%m/%d/%Y")
          
          out_path = Path("data/raw/usdm_county_latest.csv")
          all_rows = []
          fieldnames = None

          # Try up to 3 consecutive weeks
          for week_attempt in range(3):
              attempt_date_str = f"{current_dt.month}/{current_dt.day}/{current_dt.year}"
              print(f"Fetching USDM data for date: {attempt_date_str} ...")
              
              all_rows = []
              for st in states:
                  url = (
                      "https://usdmdataservices.unl.edu/api/CountyStatistics/"
                      "GetDroughtSeverityStatisticsByAreaPercent"
                      f"?aoi={st}&startdate={attempt_date_str}&enddate={attempt_date_str}&statisticsType=1"
                  )
                  r = requests.get(url, headers={"Accept": "text/csv"}, timeout=60)
                  r.raise_for_status()
                  
                  lines = [line for line in r.text.splitlines() if line.strip()]
                  if not lines or "No Data" in lines[0]:
                      continue
                      
                  reader = csv.DictReader(lines)
                  rows = list(reader)
                  if rows:
                      if fieldnames is None:
                          fieldnames = reader.fieldnames
                      all_rows.extend(rows)
              
              if all_rows:
                  print(f"Success! Found {len(all_rows)} rows.")
                  break
              
              print("No rows returned. Falling back to the previous week...")
              current_dt -= timedelta(days=7)

          if not all_rows:
              raise SystemExit("USDM returned 0 county rows after 3 attempts.")

          with open(out_path, "w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(all_rows)

          print(f"Wrote {len(all_rows)} rows to {out_path}")
          PY
        env:
          USDM_DATE: ${{ steps.dates.outputs.usdm_date }}

      - name: Run drought ingest
        run: python3 ingest/drought_monitor.py

      - name: Run full pipeline
        run: python3 build.py --skip-usgs --skip-usbr

      - name: Commit and push updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/usdm_county_latest.csv \
                  data/processed/drought_monitor.csv \
                  data/output/analysis_summary.json \
                  data/output/master_analysis.csv \
                  data/output/water_opp_map.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: weekly USDM refresh $(date +%Y-%m-%d)" && git push
