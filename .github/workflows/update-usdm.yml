name: Update USDM Drought Data

on:
  schedule:
    - cron: "0 18 * * 4"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run drought ingest
        run: |
          python3 ingest/drought_monitor.py

      - name: Run full pipeline
        run: |
          python3 build.py --skip-usgs --skip-usbr

      - name: Commit and push updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/usdm_county_latest.csv \
                  data/processed/drought_monitor.csv \
                  data/output/analysis_summary.json \
                  data/output/master_analysis.csv \
                  data/output/water_opp_map.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: weekly USDM refresh $(date +%Y-%m-%d)" && git push
